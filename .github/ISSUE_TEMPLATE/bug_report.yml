name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for the report! For **security vulnerabilities**, do not file here — see SECURITY.md."
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure ...
        2. Send prompt ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (fully validated)
        - Windows (paths exist, less tested)
        - Linux (paths exist, less tested)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "e.g. main @ abc1234"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / trace
      description: "e.g. from ~/.llmguard/debug_trace.jsonl, firewall.log, or browser_proxy.log"
      render: shell
