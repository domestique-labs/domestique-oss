name: Release

# Publishes `domestique` to PyPI when a GitHub Release is published.
#
# FLOW (nothing reaches PyPI until it has passed a cross-OS pipx install):
#   build          -> guard tag == pyproject version, build sdist+wheel, twine check
#   smoke-artifact -> pipx-install the built WHEEL on ubuntu/macos/windows, run
#                     `domestique --help` + `domestique demo` (bare install, no extras
#                     -> never touches the Ollama/Tier-3 runtime)
#   publish        -> PyPI Trusted Publishing via OIDC (no stored token), gated behind
#                     the `pypi` environment (manual-approve reviewer + tag `v*` rule)
#   smoke-pypi     -> pipx install `domestique==<version>` from the REAL index, so the
#                     exact `pipx install domestique` UX users get is proven to work
#
# ONE-TIME SETUP (see RELEASING.md): claim `domestique` on PyPI, register the Trusted
# Publisher (repo + this workflow filename + environment `pypi`), create the `pypi`
# environment with a required reviewer and a `v*` deployment-tag rule.

on:
  release:
    types: [published]

concurrency:
  # Never cancel a publish mid-flight.
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build & version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Guard — release tag matches pyproject version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"   # v0.1.0 -> 0.1.0
          PKG_VERSION="$(python -c 'import tomllib, pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          echo "tag=$TAG_VERSION  pyproject=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Release tag ($TAG_VERSION) != pyproject version ($PKG_VERSION). Bump pyproject.toml or fix the tag, then re-release."
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke-artifact:
    name: pipx smoke — wheel (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Install pipx
        run: python -m pip install --upgrade pipx

      - name: pipx install the built wheel
        shell: bash
        run: |
          WHEEL="$(ls dist/*.whl)"
          echo "installing $WHEEL"
          pipx install "$WHEEL"
          # Expose pipx's bin dir so the installed console script is on PATH below.
          echo "$(pipx environment --value PIPX_BIN_DIR)" >> "$GITHUB_PATH"

      - name: Smoke — help + demo (bare install, no extras)
        shell: bash
        run: |
          domestique --help
          domestique demo

  publish:
    name: Publish to PyPI (OIDC)
    needs: smoke-artifact
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/domestique
    permissions:
      id-token: write   # required for Trusted Publishing; no token stored
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  smoke-pypi:
    name: pipx smoke — PyPI (${{ matrix.os }})
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pipx
        run: python -m pip install --upgrade pipx

      - name: Resolve version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: pipx install from PyPI (retry for index propagation)
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ok=""
          for i in 1 2 3 4 5 6; do
            if pipx install "domestique==$VERSION"; then ok=1; break; fi
            echo "attempt $i failed (index may still be propagating); sleeping 30s"
            sleep 30
          done
          if [ -z "$ok" ]; then
            echo "::error::pipx install domestique==$VERSION failed after retries"
            exit 1
          fi
          echo "$(pipx environment --value PIPX_BIN_DIR)" >> "$GITHUB_PATH"

      - name: Smoke — help + demo
        shell: bash
        run: |
          domestique --help
          domestique demo
