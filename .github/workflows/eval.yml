name: Eval

on:
  pull_request:
    branches: [main]

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    name: Deterministic metrics
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          # Need base history so we can check out and measure `main` on the
          # same runner (fair, environment-controlled latency comparison).
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Eval — PR head
        run: |
          # Freeze the PR's corpus so both runs score against identical inputs,
          # even if this PR edits the corpus.
          cp bench/eval/data/corpus.jsonl "$RUNNER_TEMP/corpus.jsonl"
          python -m bench.eval run \
            --corpus "$RUNNER_TEMP/corpus.jsonl" \
            --out "$RUNNER_TEMP/pr-results.json" \
            --commit "${{ github.event.pull_request.head.sha }}"

      - name: Eval — main (same runner)
        run: |
          git checkout --quiet --detach "${{ github.event.pull_request.base.sha }}"
          pip install -e ".[dev]"
          python -m bench.eval run \
            --corpus "$RUNNER_TEMP/corpus.jsonl" \
            --out "$RUNNER_TEMP/main-results.json" \
            --commit "${{ github.event.pull_request.base.sha }}"
          # Return to PR head so the compare/render step uses this PR's harness.
          git checkout --quiet --detach "${{ github.event.pull_request.head.sha }}"

      - name: Compare + regression gate (main vs PR)
        run: |
          python -m bench.eval compare \
            --main "$RUNNER_TEMP/main-results.json" \
            --pr "$RUNNER_TEMP/pr-results.json" \
            --fail-on-regression | tee scorecard.md

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: |
            ${{ runner.temp }}/pr-results.json
            ${{ runner.temp }}/main-results.json

      - name: Comment scorecard on PR
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let body = "### Domestique eval scorecard\n_(scorecard unavailable)_";
            try { body = fs.readFileSync('scorecard.md', 'utf8'); } catch (e) {}
            const marker = "<!-- domestique-eval-scorecard -->";
            body = marker + "\n" + body;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
