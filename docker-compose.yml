services:
  firewall:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_FIREWALL_OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_FIREWALL_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_FIREWALL_AZURE_API_KEY=${AZURE_API_KEY:-}
      - LLM_FIREWALL_AZURE_API_BASE=${AZURE_API_BASE:-}
      - LLM_FIREWALL_FAIL_MODE=closed
      - LLM_FIREWALL_POLICY_PATH=llmguard/policy/rules.yaml
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  # TLS termination - presents enterprise-CA certs to intercepted domains.
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./infra/certs:/etc/nginx/certs:ro
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - firewall
    restart: unless-stopped
