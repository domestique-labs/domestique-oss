<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- LLM Firewall Logo: Shield with neural network graph inside -->
  <!-- Inspired by DOMESTIQUE shield+network concept -->
  
  <!-- Outer shield -->
  <path d="M256 28 C256 28 80 80 80 80 C80 80 80 280 80 280 C80 400 256 484 256 484 C256 484 432 400 432 280 C432 280 432 80 432 80 C432 80 256 28 256 28 Z" 
        fill="none" stroke="#6366f1" stroke-width="18" stroke-linejoin="round"/>
  
  <!-- Inner shield outline -->
  <path d="M256 68 C256 68 120 110 120 110 C120 110 120 270 120 270 C120 370 256 440 256 440 C256 440 392 370 392 270 C392 270 392 110 392 110 C392 110 256 68 256 68 Z" 
        fill="none" stroke="#6366f1" stroke-width="10" stroke-linejoin="round" opacity="0.4"/>

  <!-- Neural network nodes (7 nodes in a hexagonal arrangement) -->
  <!-- Center node -->
  <circle cx="256" cy="256" r="14" fill="#6366f1"/>
  <!-- Top -->
  <circle cx="256" cy="176" r="11" fill="#8b5cf6"/>
  <!-- Top-right -->
  <circle cx="325" cy="216" r="11" fill="#8b5cf6"/>
  <!-- Bottom-right -->
  <circle cx="325" cy="296" r="11" fill="#8b5cf6"/>
  <!-- Bottom -->
  <circle cx="256" cy="336" r="11" fill="#8b5cf6"/>
  <!-- Bottom-left -->
  <circle cx="187" cy="296" r="11" fill="#8b5cf6"/>
  <!-- Top-left -->
  <circle cx="187" cy="216" r="11" fill="#8b5cf6"/>

  <!-- Neural network connections (all nodes connected to center + adjacent) -->
  <!-- Center connections -->
  <line x1="256" y1="256" x2="256" y2="176" stroke="#6366f1" stroke-width="3" opacity="0.7"/>
  <line x1="256" y1="256" x2="325" y2="216" stroke="#6366f1" stroke-width="3" opacity="0.7"/>
  <line x1="256" y1="256" x2="325" y2="296" stroke="#6366f1" stroke-width="3" opacity="0.7"/>
  <line x1="256" y1="256" x2="256" y2="336" stroke="#6366f1" stroke-width="3" opacity="0.7"/>
  <line x1="256" y1="256" x2="187" y2="296" stroke="#6366f1" stroke-width="3" opacity="0.7"/>
  <line x1="256" y1="256" x2="187" y2="216" stroke="#6366f1" stroke-width="3" opacity="0.7"/>
  
  <!-- Outer ring connections -->
  <line x1="256" y1="176" x2="325" y2="216" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
  <line x1="325" y1="216" x2="325" y2="296" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
  <line x1="325" y1="296" x2="256" y2="336" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
  <line x1="256" y1="336" x2="187" y2="296" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
  <line x1="187" y1="296" x2="187" y2="216" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
  <line x1="187" y1="216" x2="256" y2="176" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
  
  <!-- Cross connections for density -->
  <line x1="256" y1="176" x2="325" y2="296" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="176" x2="187" y2="296" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <line x1="325" y1="216" x2="187" y2="296" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <line x1="325" y1="216" x2="256" y2="336" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <line x1="187" y1="216" x2="325" y2="296" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
  <line x1="187" y1="216" x2="256" y2="336" stroke="#6366f1" stroke-width="1.5" opacity="0.3"/>
</svg>
