# nginx.conf - TLS termination for the LLM Firewall
# Terminates TLS using the CA-signed certificates and forwards to the proxy.

worker_processes auto;
events {
    worker_connections 4096;
}

http {
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Upstream: the LLM Firewall proxy
    upstream firewall_proxy {
        server proxy:8000;
        keepalive 32;
    }

    # HTTPS server - presents as the LLM provider
    server {
        listen 443 ssl;
        server_name api.openai.com api.anthropic.com generativelanguage.googleapis.com
                    api.cohere.ai api.mistral.ai api.together.xyz
                    *.openai.azure.com;

        # CA-signed certificate (covers all intercepted domains via SAN)
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Forward all requests to the firewall proxy
        location / {
            proxy_pass http://firewall_proxy;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-Host $host;

            # Streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;

            # SSE support for streaming responses
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
        }
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }
}
