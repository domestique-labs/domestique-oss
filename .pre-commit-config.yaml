# Local dev gate — mirrors CI lint-core. Install with: pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep this rev in sync with the `ruff` constraint in pyproject.toml's [dev]
    # extras (currently ruff>=0.8,<1). CI installs a floating version in that
    # range; if they diverge, local and CI lint can disagree. Bump via
    # `pre-commit autoupdate` when the dev-extras ruff constraint changes.
    rev: v0.15.20
    hooks:
      - id: ruff
        name: ruff (lint, core)
        args: [--fix]
        files: ^llmguard/
      - id: ruff-format
        name: ruff (format, core)
        files: ^llmguard/
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (unit, fast)
        entry: python -m pytest tests/unit -q
        language: system
        pass_filenames: false
        stages: [pre-push]
